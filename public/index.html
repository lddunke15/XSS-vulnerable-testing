<!DOCTYPE html>
<html>
<head>
  <title>Test Page</title>
</head>
<body>
  <h1>🧪 XSS Test Page</h1>

  <input id="input" placeholder="payload" />
  <button onclick="sendLog()">Send</button>

  <script>
    function sendLog() {
      const payload = document.getElementById("input").value;

      fetch("/log", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          payload,
          page: window.location.href
        })
      });

      alert("sent");
    }
  </script>

  <a href="/dashboard.html">Dashboard</a>
</body>
</html>
